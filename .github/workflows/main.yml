name: Update IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz tqdm
        
    - name: Download simple IPTV generator
      run: |
        cat > generate_iptv.py << 'EOF'
        import requests
        import json
        import os
        from datetime import datetime
        
        def download_source(url):
            try:
                r = requests.get(url, timeout=30)
                if r.status_code == 200:
                    return r.text
            except:
                pass
            return ""
        
        def parse_m3u(content):
            channels = []
            lines = content.split('\n')
            current_name = ""
            current_group = ""
            
            for line in lines:
                line = line.strip()
                if line.startswith('#EXTINF:'):
                    # Extract name
                    if ',' in line:
                        current_name = line.split(',')[-1].strip()
                    # Extract group
                    if 'group-title="' in line:
                        start = line.find('group-title="') + 13
                        end = line.find('"', start)
                        current_group = line[start:end]
                elif line.startswith(('http://', 'https://')):
                    if current_name:
                        channels.append({
                            'name': current_name,
                            'url': line,
                            'group': current_group or '未分类'
                        })
                        current_name = ""
            
            return channels
        
        def main():
            sources = [
                "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u",
                "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hk.m3u",
                "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/tw.m3u",
            ]
            
            all_channels = []
            for url in sources:
                print(f"Downloading {url}...")
                content = download_source(url)
                if content:
                    channels = parse_m3u(content)
                    print(f"  Found {len(channels)} channels")
                    all_channels.extend(channels)
            
            # Group by category
            groups = {}
            for ch in all_channels:
                group = ch['group']
                if group not in groups:
                    groups[group] = []
                groups[group].append(ch)
            
            # Generate output
            os.makedirs('output', exist_ok=True)
            
            with open('output/result.txt', 'w', encoding='utf-8') as f:
                f.write(f"# IPTV Playlist - Generated {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\\n\\n")
                for group, channels in groups.items():
                    f.write(f"{group},#genre#\\n")
                    for ch in channels:
                        f.write(f"{ch['name']},{ch['url']}\\n")
                    f.write("\\n")
            
            print(f"\\nTotal: {len(all_channels)} channels")
            print("Saved to output/result.txt")
        
        if __name__ == '__main__':
            main()
        EOF
        
    - name: Generate IPTV list
      run: python generate_iptv.py
      
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/
        git diff --staged --quiet || (git commit -m "Update IPTV $(date +'%Y-%m-%d %H:%M:%S')" && git push)
